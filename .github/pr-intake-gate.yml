project:
  name: 'Repo Governance'

trivial:
  max_changed_lines: 30
  allowed_path_globs:
    - 'README.md'
    - 'docs/**/*.md'

high_risk:
  description: 'reusable GitHub Actions, workflow templates, policy schemas, rollout scripts, reference policies, CI workflows, and agent instructions'

high_risk_path_globs:
  - '.github/**'
  - 'AGENTS.md'
  - 'actions/**'
  - 'scripts/**'
  - 'schemas/**'
  - 'templates/**'
  - 'examples/**'
  - 'docs/POLICY.md'
  - 'docs/ROLLOUT.md'
  - 'tests/**'

trusted_authors:
  permissions:
    - 'admin'
    - 'maintain'
    - 'write'
  fallback_author_associations:
    - 'OWNER'
    - 'MEMBER'
    - 'COLLABORATOR'

external_context:
  required_sections:
    - 'Problem'
    - 'Why now'
    - 'Existing options checked'
    - 'Alternatives considered'
    - 'No-code alternative'
    - 'Why code is needed'
  no_code_section: 'No-code alternative'
  first_time_author_associations:
    - 'FIRST_TIMER'
    - 'FIRST_TIME_CONTRIBUTOR'

labels:
  pass: 'intake/pass'
  needs_intent: 'intake/needs-linked-intent'
  needs_more_context: 'intake/needs-more-context'
  no_code_alternative: 'intake/no-code-alternative'
  high_risk: 'intake/high-risk'
  accepted_for_pr: 'intake/accepted-for-pr'
  first_time: 'intake/first-time-contributor'
  override: 'maintainer/override-intake'

linked_intent:
  description: 'a GitHub Issue, Discussion, ADR, research note, or tracked governance rollout decision'
  accept_patterns:
    - '#\d+'
    - 'issues/\d+'
    - 'discussions/\d+'
    - '(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#\d+'
    - 'https://github.com/[^/\s]+/[^/\s]+/(issues|discussions)/\d+'
    - 'docs/adr/[A-Za-z0-9._/-]+\.md'
    - 'docs/research/[A-Za-z0-9._/-]+\.md'
    - 'docs/rollout/[A-Za-z0-9._/-]+\.md'

label_details:
  intake/pass:
    color: '2ea44f'
    description: 'PR intake passed'
  intake/needs-linked-intent:
    color: 'd29922'
    description: 'PR needs linked issue, discussion, or governance intent artifact'
  intake/needs-more-context:
    color: 'd29922'
    description: 'External PR needs required problem, timing, option, and alternative context'
  intake/no-code-alternative:
    color: 'd29922'
    description: 'External PR needs no-code alternative analysis'
  intake/high-risk:
    color: 'cf222e'
    description: 'PR touches high-risk governance surfaces and needs maintainer attention'
  intake/accepted-for-pr:
    color: '0969da'
    description: 'Maintainer accepted external PR intent for ordinary review'
  intake/first-time-contributor:
    color: 'bf8700'
    description: 'External PR author appears to be a first-time contributor'
  maintainer/override-intake:
    color: '8250df'
    description: 'Maintainer accepts responsibility to bypass intake gate'

bot_comment:
  marker: '<!-- repo-governance-pr-intake-gate -->'
