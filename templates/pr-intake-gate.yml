project:
  name: '<PROJECT_NAME>'

trivial:
  max_changed_lines: 30
  allowed_path_globs:
    - 'README.md'
    - 'LICENSE'
    - 'NOTICE'
    - 'docs/**/*.md'

high_risk:
  description: 'workflows, dependency manifests, install scripts, runtime code, public APIs, auth/security, migrations, deployment config, and project governance files'

high_risk_path_globs:
  - '.github/**'
  - 'AGENTS.md'
  - 'CONTRIBUTING.md'
  - 'SECURITY.md'
  - 'package.json'
  - 'package-lock.json'
  - 'pnpm-lock.yaml'
  - 'yarn.lock'
  - 'bun.lockb'
  - 'Cargo.toml'
  - 'Cargo.lock'
  - 'go.mod'
  - 'go.sum'
  - '**/go.mod'
  - '**/go.sum'
  - 'requirements*.txt'
  - 'pyproject.toml'
  - 'poetry.lock'
  - 'Dockerfile'
  - 'docker/**'
  - 'src/**'
  - 'app/**'
  - 'apps/**'
  - 'crates/**'
  - 'lib/**'
  - 'scripts/**'
  - 'tools/**'
  - '**/auth/**'
  - '**/security/**'
  - '**/crypto/**'
  - '**/migrations/**'

trusted_authors:
  permissions:
    - 'admin'
    - 'maintain'
    - 'write'
  fallback_author_associations:
    - 'OWNER'
    - 'MEMBER'
    - 'COLLABORATOR'

external_context:
  required_sections:
    - 'Problem'
    - 'Why now'
    - 'Existing options checked'
    - 'Alternatives considered'
    - 'No-code alternative'
    - 'Why code is needed'
  no_code_section: 'No-code alternative'
  first_time_author_associations:
    - 'FIRST_TIMER'
    - 'FIRST_TIME_CONTRIBUTOR'

labels:
  pass: 'intake/pass'
  needs_intent: 'intake/needs-linked-intent'
  needs_more_context: 'intake/needs-more-context'
  no_code_alternative: 'intake/no-code-alternative'
  high_risk: 'intake/high-risk'
  accepted_for_pr: 'intake/accepted-for-pr'
  first_time: 'intake/first-time-contributor'
  override: 'maintainer/override-intake'

linked_intent:
  description: 'a GitHub Issue, GitHub Discussion, ADR, research note, goal, report, or other project-tracked intent artifact'
  accept_patterns:
    - '#\d+'
    - 'issues/\d+'
    - 'discussions/\d+'
    - '(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#\d+'
    - 'https://github.com/[^/\s]+/[^/\s]+/(issues|discussions)/\d+'
    - 'docs/adr/[A-Za-z0-9._/-]+\.md'
    - 'docs/research/[A-Za-z0-9._/-]+\.md'
    - 'work/goals/[A-Za-z0-9._/-]+\.md'
    - 'work/reports/[A-Za-z0-9._/-]+\.md'

label_details:
  intake/pass:
    color: '2ea44f'
    description: 'PR intake passed'
  intake/needs-linked-intent:
    color: 'd29922'
    description: 'PR needs linked issue, discussion, decision, research, goal, or report'
  intake/needs-more-context:
    color: 'd29922'
    description: 'External PR needs required problem, timing, option, and alternative context'
  intake/no-code-alternative:
    color: 'd29922'
    description: 'External PR needs no-code alternative analysis'
  intake/high-risk:
    color: 'cf222e'
    description: 'PR touches high-risk surfaces and needs maintainer attention'
  intake/accepted-for-pr:
    color: '0969da'
    description: 'Maintainer accepted external PR intent for ordinary review'
  intake/first-time-contributor:
    color: 'bf8700'
    description: 'External PR author appears to be a first-time contributor'
  maintainer/override-intake:
    color: '8250df'
    description: 'Maintainer accepts responsibility to bypass intake gate'

bot_comment:
  marker: '<!-- pr-intake-gate -->'
