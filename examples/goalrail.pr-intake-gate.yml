project:
  name: 'GoalRail'

high_risk:
  description: 'workflows, contributor governance, product canon, ops docs, ADRs, research, GoalRail work overlays, AI instruction surfaces, prompt-injection-like documentation, apps, scripts, tooling, dependency files, deployments, migrations, auth, security, crypto, and runtime behavior'

trivial:
  max_changed_lines: 30
  allowed_path_globs:
    - 'README.md'
    - 'README.ru.md'
    - 'SUPPORT.md'
    - 'CODE_OF_CONDUCT.md'
    - 'TRADEMARKS.md'
    - 'NOTICE'
    - 'LICENSE'
    - 'docs/**/*.md'

high_risk_path_globs:
  - '.github/**'
  - 'AGENTS.md'
  - 'CONTRIBUTING.md'
  - 'SECURITY.md'
  - 'DCO.md'
  - 'apps/**'
  - 'scripts/**'
  - 'tools/**'
  - 'docs/product/**'
  - 'docs/ops/**'
  - 'docs/adr/**'
  - 'docs/research/**'
  - 'docs/reference/**'
  - '.goalrail/**'
  - '.punk/**'
  - 'package.json'
  - 'package-lock.json'
  - 'pnpm-lock.yaml'
  - 'yarn.lock'
  - 'bun.lockb'
  - 'go.mod'
  - 'go.sum'
  - '**/go.mod'
  - '**/go.sum'
  - 'wrangler.toml'
  - '**/wrangler.toml'
  - '**/auth/**'
  - '**/security/**'
  - '**/crypto/**'
  - '**/migrations/**'

instruction_surface:
  description: 'Goalrail docs and metadata that AI agents may read as instructions, product canon, operating truth, or PR governance context'
  path_globs:
    - 'README.md'
    - 'README.ru.md'
    - 'AGENTS.md'
    - '**/AGENTS.md'
    - 'CLAUDE.md'
    - '**/CLAUDE.md'
    - 'GEMINI.md'
    - '**/GEMINI.md'
    - '.github/PULL_REQUEST_TEMPLATE.md'
    - '.github/pull_request_template.md'
    - '.github/pull_request_template/**'
    - '.github/ISSUE_TEMPLATE/**'
    - '.github/pr-intake-gate.yml'
    - 'docs/INDEX.md'
    - 'docs/product/**'
    - 'docs/ops/**'
    - 'docs/adr/**'
    - 'docs/research/**'
    - '.goalrail/**'

prompt_injection:
  enabled: true
  description: 'detect obvious prompt-injection-like additions in external PRs before ordinary review'
  text_path_globs:
    - '*.md'
    - '**/*.md'
    - '*.mdx'
    - '**/*.mdx'
    - '*.txt'
    - '**/*.txt'
    - '.github/**'
    - 'docs/**'
    - '.goalrail/**'

trusted_authors:
  permissions:
    - 'admin'
    - 'maintain'
    - 'write'
  fallback_author_associations:
    - 'OWNER'
    - 'MEMBER'
    - 'COLLABORATOR'

external_context:
  required_sections:
    - 'Goal / intent'
    - 'ComponentImpact'
    - 'DocImpact'
    - 'Rule Stack checklist'
    - 'Validation / proof'
    - 'No-code alternative'
    - 'Why code is needed'
  no_code_section: 'No-code alternative'
  first_time_author_associations:
    - 'FIRST_TIMER'
    - 'FIRST_TIME_CONTRIBUTOR'

labels:
  pass: 'intake/pass'
  needs_intent: 'intake/needs-linked-intent'
  needs_more_context: 'intake/needs-more-context'
  no_code_alternative: 'intake/no-code-alternative'
  high_risk: 'intake/high-risk'
  accepted_for_pr: 'intake/accepted-for-pr'
  first_time: 'intake/first-time-contributor'
  override: 'maintainer/override-intake'

linked_intent:
  accept_patterns:
    - '#\d+'
    - 'issues/\d+'
    - 'discussions/\d+'
    - '(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#\d+'
    - 'https://github.com/[^/\s]+/[^/\s]+/(issues|discussions)/\d+'
    - 'docs/adr/[A-Za-z0-9._/-]+\.md'
    - 'docs/research/[A-Za-z0-9._/-]+\.md'
    - 'docs/ops/DECISIONS\.md#D-[0-9]+'
    - 'D-[0-9]{4}'
    - '.goalrail/work/goals/[A-Za-z0-9._/-]+\.md'
    - '.goalrail/work/reports/[A-Za-z0-9._/-]+\.md'

label_details:
  intake/pass:
    color: '2ea44f'
    description: 'PR intake passed'
  intake/needs-linked-intent:
    color: 'd29922'
    description: 'PR needs linked Issue, Discussion, decision, ADR, research, or Goalrail work artifact'
  intake/needs-more-context:
    color: 'd29922'
    description: 'External PR needs Goalrail context, component/doc impact, rule-stack, and proof details'
  intake/no-code-alternative:
    color: 'd29922'
    description: 'External PR needs no-code alternative analysis'
  intake/high-risk:
    color: 'cf222e'
    description: 'PR touches high-risk Goalrail surfaces and needs maintainer attention'
  intake/accepted-for-pr:
    color: '0969da'
    description: 'Maintainer accepted external PR intent for ordinary review'
  intake/first-time-contributor:
    color: 'bf8700'
    description: 'External PR author appears to be a first-time contributor'
  maintainer/override-intake:
    color: '8250df'
    description: 'Maintainer accepts PR intake override responsibility'

bot_comment:
  marker: '<!-- goalrail-pr-intake-gate -->'
