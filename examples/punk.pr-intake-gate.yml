project:
  name: 'Punk'

high_risk:
  description: 'workflows, scripts, core crates, product truth, work ledger, research, eval specs, public narrative, and site/brand surfaces'

trivial:
  max_changed_lines: 30
  allowed_path_globs:
    - 'README.md'
    - 'SUPPORT.md'
    - 'CODE_OF_CONDUCT.md'
    - 'TRADEMARKS.md'
    - 'NOTICE'
    - 'LICENSE'
    - 'DCO.md'
    - 'docs/**/*.md'

high_risk_path_globs:
  - '.github/**'
  - 'AGENTS.md'
  - 'CONTRIBUTING.md'
  - 'SECURITY.md'
  - 'Cargo.toml'
  - 'Cargo.lock'
  - 'crates/**'
  - 'scripts/**'
  - 'docs/product/**'
  - 'docs/adr/**'
  - 'evals/**'
  - 'flows/**'
  - 'knowledge/**'
  - 'publishing/**'
  - 'site/**'
  - 'brand/**'
  - 'work/**'

trusted_authors:
  permissions:
    - 'admin'
    - 'maintain'
    - 'write'
  fallback_author_associations:
    - 'OWNER'
    - 'MEMBER'
    - 'COLLABORATOR'

external_context:
  required_sections:
    - 'Problem'
    - 'Why now'
    - 'Existing options checked'
    - 'Alternatives considered'
    - 'No-code alternative'
    - 'Why code is needed'
  no_code_section: 'No-code alternative'
  first_time_author_associations:
    - 'FIRST_TIMER'
    - 'FIRST_TIME_CONTRIBUTOR'

labels:
  pass: 'intake/pass'
  needs_intent: 'intake/needs-linked-intent'
  needs_more_context: 'intake/needs-more-context'
  no_code_alternative: 'intake/no-code-alternative'
  high_risk: 'intake/high-risk'
  accepted_for_pr: 'intake/accepted-for-pr'
  first_time: 'intake/first-time-contributor'
  override: 'maintainer/override-intake'

linked_intent:
  accept_patterns:
    - '#\d+'
    - 'issues/\d+'
    - 'discussions/\d+'
    - '(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#\d+'
    - 'https://github.com/[^/\s]+/[^/\s]+/(issues|discussions)/\d+'
    - 'work/goals/[A-Za-z0-9._/-]+\.md'
    - 'work/reports/[A-Za-z0-9._/-]+\.md'
    - 'docs/adr/[A-Za-z0-9._/-]+\.md'
    - 'knowledge/research/[A-Za-z0-9._/-]+\.md'
    - 'evals/specs/[A-Za-z0-9._/-]+\.md'

label_details:
  intake/pass:
    color: '2ea44f'
    description: 'PR intake passed'
  intake/needs-linked-intent:
    color: 'd29922'
    description: 'PR needs linked Issue, Discussion, or Punk intent artifact'
  intake/needs-more-context:
    color: 'd29922'
    description: 'External PR needs required problem, timing, option, and alternative context'
  intake/no-code-alternative:
    color: 'd29922'
    description: 'External PR needs no-code alternative analysis'
  intake/high-risk:
    color: 'cf222e'
    description: 'PR touches high-risk Punk surfaces and needs maintainer attention'
  intake/accepted-for-pr:
    color: '0969da'
    description: 'Maintainer accepted external PR intent for ordinary review'
  intake/first-time-contributor:
    color: 'bf8700'
    description: 'External PR author appears to be a first-time contributor'

bot_comment:
  marker: '<!-- punk-pr-intake-gate -->'
