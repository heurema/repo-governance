name: Codex Review Gate
description: Fail when active Codex Review threads remain unresolved on a pull request.

inputs:
  github-token:
    description: GitHub token used to read PR review threads.
    required: false
    default: ''
  review-author-logins:
    description: Comma-separated GitHub logins whose unresolved review threads should block the gate.
    required: false
    default: chatgpt-codex-connector
  ignore-outdated:
    description: Ignore outdated review threads.
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Run Codex review gate
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        CODEX_REVIEW_GATE_AUTHOR_LOGINS: ${{ inputs.review-author-logins }}
        CODEX_REVIEW_GATE_IGNORE_OUTDATED: ${{ inputs.ignore-outdated }}
      run: |
        python3 "$GITHUB_ACTION_PATH/codex_review_gate.py"
